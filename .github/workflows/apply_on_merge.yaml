name: Apply Cluster Configuration

on:
  push:
    branches:
      - main

jobs:
  apply-cluster-config:
    runs-on: ubuntu-latest
    env:
      TFY_API_KEY: ${{ secrets.TFY_API_KEY }}
      TFY_HOST: ${{ secrets.TFY_HOST }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup TFY CLI
        run: pip install -U "truefoundry"

      - name: Apply changed manifests
        run: |
          set -euo pipefail
          tfy apply --dir truefoundry --diffs-only --sync --ref "${{ github.event.before }}"
