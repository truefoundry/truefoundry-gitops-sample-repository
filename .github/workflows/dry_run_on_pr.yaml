name: TFY Dry Run on PR

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "access/**"
      - "clusters/**"
      - "gateway/**"
      - "modelregistry/**"
      - "platform/**"
      - "repositories/**"
      - "teams/**"
      - "integrations/**"
      - "virtualaccounts/**"

jobs:
  dry-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest_root:
          - access
          - clusters
          - gateway
          - modelregistry
          - platform
          - repositories
          - teams
          - integrations
          - virtualaccounts
    env:
      TFY_API_KEY: ${{ secrets.TFY_API_KEY }}
      TFY_HOST: ${{ secrets.TFY_HOST }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup TFY CLI
        run: pip install -U "truefoundry"

      - name: TFY dry-run (${{ matrix.manifest_root }})
        run: |
          set -euo pipefail
          ROOT="${{ matrix.manifest_root }}"
          if [[ ! -d "$ROOT" ]]; then
            echo "Skip: no directory $ROOT"
            exit 0
          fi
          BASE_REF="origin/${{ github.base_ref }}"
          echo "Dry-run: $ROOT (vs $BASE_REF)"
          tfy apply -d "$ROOT" --dry-run --show-diff --diffs-only --ref "$BASE_REF"
