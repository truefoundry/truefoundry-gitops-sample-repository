name: TFY Dry Run on PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  dry-run:
    runs-on: ubuntu-latest
    env:
      TFY_API_KEY: ${{ secrets.TFY_API_KEY }}
      TFY_HOST: ${{ secrets.TFY_HOST }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup TFY CLI
        run: pip install -U "truefoundry==0.14.0rc.1"

      - name: TFY dry-run
        run: |
          set -euo pipefail
          rm -rf .github/workflows
          BASE_REF="origin/${{ github.base_ref }}"
          tfy apply -d . --dry-run --show-diff --diffs-only --ref "$BASE_REF"
