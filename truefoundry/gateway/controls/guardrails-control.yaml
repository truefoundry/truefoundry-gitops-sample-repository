name: guardrails-control
type: gateway-guardrails-config
rules:
  - id: cedar-local
    when:
      target:
        operator: or
        conditions:
          mcpServers:
            values:
              - custom-software
            condition: in
      subjects:
        operator: and
        conditions:
          in:
            - user:bob@truefoundry.com
    llm_input_guardrails: []
    llm_output_guardrails: []
    mcp_tool_pre_invoke_guardrails:
      - tf-regex-gp/cedar2
    mcp_tool_post_invoke_guardrails: []
  - id: pii-guardrail-test
    when:
      target:
        operator: or
        conditions:
          model:
            values:
              - openai-main/o3
            condition: in
      subjects:
        operator: and
        conditions:
          in:
            - user:vik@truefoundry.com
    llm_input_guardrails:
      - pii-guardrail/pii-guardrail
    llm_output_guardrails: []
    mcp_tool_pre_invoke_guardrails: []
    mcp_tool_post_invoke_guardrails: []

