type: service
name: <SERVICE_NAME>
image:
  type: build
  build_source:
    type: git
    branch_name: main
    ref: c4f7fce4d2e3fdec4ff3a6c7defec2293c763b48
    repo_url: https://github.com/truefoundry/emotion-classification-fastapi
  build_spec:
    type: dockerfile
    build_context_path: ./
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    python_dependencies: {}
    dockerfile_path: ./Dockerfile
ports:
  - port: 8000
    expose: true
    protocol: TCP
    app_protocol: http
    host: <HOST>
workspace_fqn: <WORKSPACE_FQN>
replicas: 1
labels:
  tfy_openapi_path: openapi.json
allow_interception: false
env:
  # This is a regular environment variable
  TEST_ENV: value
  # This is env with truefoundry secret reference
  TEST_ENV2: tfy-secret://truefoundry:apicreated35408:test
liveness_probe:
  config:
    type: http
    path: /health
    port: 8000
  failure_threshold: 3
  initial_delay_seconds: 0
  period_seconds: 10
  success_threshold: 1
  timeout_seconds: 1
resources:
  node:
    type: node_selector
    capacity_type: spot_fallback_on_demand
  cpu_request: 0.5
  cpu_limit: 0.5
  memory_request: 1000
  memory_limit: 1000
  ephemeral_storage_request: 500
  ephemeral_storage_limit: 500
auto_shutdown:
  wait_time: 900
