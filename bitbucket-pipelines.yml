# Secured repo variables: TFY_API_KEY, TFY_HOST
# tfy apply -d . includes nested dirs; rm CI YAML so TFY does not load pipelines/workflows.
image: python:3.8

pipelines:
  pull-requests:
    "**":
      - step:
          name: TFY dry-run
          script:
            - apt-get update && apt-get install -y git
            - pip install -U "truefoundry"
            - rm -f bitbucket-pipelines.yml
            - tfy apply -d truefoundry --dry-run --show-diff --diffs-only --sync --ref "${BITBUCKET_PR_DESTINATION_COMMIT}"

  branches:
    main:
      - step:
          name: TFY apply
          script:
            - apt-get update && apt-get install -y git
            - pip install -U "truefoundry"
            - rm -f bitbucket-pipelines.yml
            - tfy apply -d truefoundry --diffs-only --sync --ref "HEAD^"
